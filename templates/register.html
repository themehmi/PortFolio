<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Neym Portfolio</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: black;
            color: #e7e7e7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            line-height: 1.5;
            padding: 20px;
        }

        /* --- Global Heritage Styles (for consistency) --- */
        .image-gradient {
            position: fixed;
            top: 0;
            right: 0;
            opacity: 0.4;
            z-index: -1;
            pointer-events: none;
        }

        .layer-blur {
            width: 30rem;
            height: 0;
            position: absolute;
            top: 50px;
            right: 0;
            box-shadow: 0 0 700px 15px white;
            rotate: -30deg;
            z-index: -1;
        }

        /* --- Registration Card (Glassmorphism) --- */
        .register-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: cardReveal 0.6s ease-out;
            position: relative;
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ambient background glow inside the card */
        .register-card::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: rgba(102, 0, 197, 0.2);
            filter: blur(80px);
            opacity: 0.5;
            z-index: -1;
        }

        .register-card h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Form Group Styling --- */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a7a7a7;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            -webkit-appearance: none;
        }

        input:focus {
            outline: none;
            border-color: #6600c5;
            box-shadow: 0 0 15px rgba(102, 0, 197, 0.4);
            background: rgba(15, 23, 42, 0.8);
        }

        /* Utility classes for matching your existing CSS */
        .para { font-size: large; }

        /* --- Submit Button (Cohesive Tag-Box style) --- */
        .btn-submit-container {
            position: relative;
            margin-top: 2rem;
            height: 3.5rem;
            border-radius: 50px;
            background: linear-gradient(to right, #656565, #7f42a7,#6600c5,#5300a0,#757575,#656565);
            background-size: 200%;
            animation: animationGradient 3s linear infinite;
        }

        @keyframes animationGradient { to { background-position: 200%; } }

        input[type="submit"] {
            position: absolute;
            inset: 4px;
            background-color: black;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input[type="submit"]:hover {
            background-color: transparent; /* Makes gradient visible on hover */
            color: white;
        }

        /* --- Responsive Logic --- */
        @media (max-width: 480px) {
            .register-card {
                padding: 2.5rem 1.5rem;
            }
            .register-card h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <img class="image-gradient" src="{{ url_for('static', filename='gradient.png') }}" alt="gradiant">
    <div class="layer-blur"></div>

    <div class="register-card">
        <h1>Create Account</h1>
        <form method="POST" action="/register">
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="neym_dev" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@domain.com" required>
            </div>   

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" minlength="8" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
            </div>

            <div class="btn-submit-container">
                <input type="submit" value="START DEPLOYING ➔">
            </div>

        </form>
    </div>

</body>
</html>
